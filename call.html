<!DOCTYPE html>
<html>
<head>
  <script type='text/javascript' src='https://cdn.scaledrone.com/scaledrone.min.js'></script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoCall - Cuộc gọi video</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="call-page">
  <div class="room-info">
    <span>Mã phòng: <span id="roomIdDisplay" class="room-id"></span></span>
    <div class="tooltip">
      <button id="copyRoomId" class="copy-btn">
        <i class="fas fa-copy"></i>
      </button>
      <span class="tooltiptext" id="copyTooltip">Sao chép</span>
    </div>
  </div>

  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

  <div id="waitingOverlay" class="waiting-overlay">
    <div class="pulse">
      <i class="fas fa-video"></i>
    </div>
  </div>

  <div class="control-bar">
    <button id="toggleCamera" class="control-btn">
      <i class="fas fa-video"></i>
    </button>
    <button id="toggleMicrophone" class="control-btn">
      <i class="fas fa-microphone"></i>
    </button>
    <button id="hangup" class="control-btn hangup">
      <i class="fas fa-phone-slash"></i>
    </button>
  </div>

  <script src="call.js"></script>
</body>
</html>
